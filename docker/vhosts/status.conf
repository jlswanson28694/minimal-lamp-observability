<VirtualHost *:8080>
    <Location "/server-status">
        SetHandler server-status
        Require all granted
    </Location>

    <Location "/fpm-status">
        Require all granted
        ProxyPass "unix:/run/php/php8.5-fpm.sock|fcgi://localhost/fpm-status"
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/status_error.log
    CustomLog ${APACHE_LOG_DIR}/status_access.log combined
</VirtualHost>
ExtendedStatus On