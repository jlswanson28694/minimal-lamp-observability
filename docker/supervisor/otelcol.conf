[program:otelcol]
command=/usr/bin/otelcol-contrib --config=/etc/otelcol-contrib/config.yaml
directory=/
user=root

autostart=true
autorestart=true
startsecs=5
startretries=3

redirect_stderr=true
stdout_logfile=/var/log/otelcol.out.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

stopsignal=TERM
stopwaitsecs=10
