<VirtualHost *:8080>
    RewriteEngine On

    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/$ /server-status [R=302,L]

    <Location "/server-status">
        SetHandler server-status
        Require all granted
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/status_error.log
    CustomLog ${APACHE_LOG_DIR}/status_access.log combined
</VirtualHost>
ExtendedStatus On