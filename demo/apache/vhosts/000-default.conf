<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    # Proxy PHP files to PHP-FPM over TCP
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php8.5-fpm:9000/"
    </FilesMatch>

    LogFormat "%h %l %u %t \"%r\" %>s %b %D \"%{Referer}i\" \"%{User-agent}i\"" combined-latency
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined-latency
</VirtualHost>
