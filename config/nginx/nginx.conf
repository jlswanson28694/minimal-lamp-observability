events {}

http {
    server {
        listen 80;

        location / {
            auth_basic           "Prometheus Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://prometheus:9090; # Replace 'prometheus' with your container name if different

            # Enable HTTP/1.1 (Required for SSE)
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Pass standard headers so Prometheus knows the original request details
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for Server-Sent Events
            proxy_buffering off;

            # Extend timeouts so Nginx doesn't kill the SSE connection
            proxy_read_timeout 3600s;
        }
    }
}